<mat-toolbar class="topbar" role="banner">
  <div class="left">
    <button mat-icon-button class="icon" (click)="onToggle()" type="button" aria-label="Abrir menú">
      <mat-icon>menu</mat-icon>
    </button>

    <a routerLink="/home" class="app-title">Home</a>
    
  </div>

  <div class="spacer"></div>

  <div class="right">
    <button mat-button [matMenuTriggerFor]="userMenu" class="user-profile-btn">
      <div class="initial-circle">
        {{ userInitial() }}
      </div>
    </button>

    <mat-menu #userMenu="matMenu" class="modern-menu">
      <button mat-menu-item (click)="navigateToProfile()">
        <mat-icon>person</mat-icon>
        <span>Mi Perfil</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Cerrar sesión</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>

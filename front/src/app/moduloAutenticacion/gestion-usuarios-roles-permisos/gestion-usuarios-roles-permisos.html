<div class="container-gestion">
  <!-- Header Section -->
  <div class="header-gestion">
    <div class="title-section">
      <h1>Usuarios del Sistema</h1>
      <p>Administra los accesos, roles y permisos de los integrantes de la plataforma.</p>
    </div>
    
    <button class="btn-add" (click)="abrirModalCrear()">
      <mat-icon>person_add</mat-icon>
      Nuevo Usuario
    </button>
  </div>

  <!-- Table Card -->
  <div class="card-table">
    <table id="usuariosTable" class="tabla-moderna display responsive nowrap" style="width:100%"></table>
  </div>

  <!-- Modal Crear Usuario -->
  <div class="modal-overlay" *ngIf="showModalCrear">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Crear Nuevo Usuario</h2>
        <button class="btn-close" (click)="cerrarModales()">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div class="modal-body">
        <form class="modal-form">
          <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" placeholder="Ej: Juan Pérez">
          </div>
          <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" placeholder="juan@ejemplo.com">
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label>Rol</label>
            <select>
              <option value="admin">Administrador</option>
              <option value="user">Usuario</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" (click)="cerrarModales()">Cancelar</button>
        <button class="btn-primary">Crear Usuario</button>
      </div>
    </div>
  </div>

  <!-- Modal Editar Usuario -->
  <div class="modal-overlay" *ngIf="showModalEditar">
    <div class="modal-card editing">
      <div class="modal-header">
        <h2>Editar Usuario</h2>
        <button class="btn-close" (click)="cerrarModales()">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div class="modal-body">
        <form class="modal-form">
          <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" value="Cargando...">
          </div>
          <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" value="Cargando...">
          </div>
          <div class="form-group">
            <label>Rol</label>
            <select>
              <option value="admin">Administrador</option>
              <option value="user">Usuario</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" (click)="cerrarModales()">Cancelar</button>
        <button class="btn-primary">Guardar Cambios</button>
      </div>
    </div>
  </div>
</div>

<div class="container-gestion">
  <!-- Header Section -->
  <div class="header-gestion">
    <div class="title-section">
      <h1>Usuarios del Sistema</h1>
      <p>Administra los accesos, roles y permisos de los integrantes de la plataforma.</p>
    </div>
    
    <button class="btn-add" (click)="abrirModalCrear()">
      <mat-icon>person_add</mat-icon>
      Nuevo Usuario
    </button>
  </div>

  <!-- Table Card -->
  <div class="card-table">
    <table id="usuariosTable" class="tabla-moderna display responsive nowrap" style="width:100%"></table>
  </div>

  <!-- Modal Crear Usuario -->
  <div class="modal-overlay" *ngIf="showModalCrear">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Crear Nuevo Usuario</h2>
        <button class="btn-close" (click)="cerrarModales()">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div class="modal-body">
        <form class="modal-form">
          <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" placeholder="Ej: Juan Pérez" [(ngModel)]="usuarioCrear.name" name="name">
          </div>
          <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" placeholder="juan@ejemplo.com" [(ngModel)]="usuarioCrear.email" name="email">
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" placeholder="••••••••" [(ngModel)]="usuarioCrear.password" name="password">
          </div>
          <div class="form-group">
            <label>Confirmar Contraseña</label>
            <input type="password" placeholder="••••••••" [(ngModel)]="usuarioCrear.password_confirmation" name="password_confirmation">
          </div>
          <div class="form-group">
            <label>Rol</label>
            <select [(ngModel)]="usuarioCrear.rol" name="rol">
              <option value="admin">Administrador</option>
              <option value="user">Usuario</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" (click)="cerrarModales()">Cancelar</button>
        <button class="btn-primary" (click)="guardarUsuario()">Crear Usuario</button>
      </div>
    </div>
  </div>

  <!-- Modal Editar Usuario -->
  <div class="modal-overlay" *ngIf="showModalEditar">
    <div class="modal-card editing">
      <div class="modal-header">
        <h2>Editar Usuario</h2>
        <button class="btn-close" (click)="cerrarModales()">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div class="modal-body">
        <form class="modal-form">
          <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" value="Cargando..." [(ngModel)]="usuario.name" name="name">
          </div>
          <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" value="Cargando..." [(ngModel)]="usuario.email" name="email">
          </div>
          <div class="form-group">
            <label>Contraseña (Opcional)</label>
            <input type="password" placeholder="••••••••" name="password">
            <small style="color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-top: 4px; display: block;">
              Deja en blanco para mantener la actual.
            </small>
          </div>
          <div class="form-group">
            <label>Rol</label>
            <select [(ngModel)]="usuario.rol" name="rol">
              <option value="">Sin Rol</option>
              <option value="admin">Administrador</option>
              <option value="user">Usuario</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" (click)="cerrarModales()">Cancelar</button>
        <button class="btn-primary" (click)="guardarCambios()">Guardar Cambios</button>
      </div>
    </div>
  </div>
</div>
